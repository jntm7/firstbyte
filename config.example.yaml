# FirstByte — Example Configuration
# Copy this file to config.yaml and edit to suit your feeds.
#
# All settings can also be overridden via environment variables.
# See README or config.go for the full list of supported vars.

sources:
  - name: Hacker News
    url: https://news.ycombinator.com/rss
    max_articles: 5
  - name: GitHub Blog
    url: https://github.blog/feed/
    max_articles: 2
  - name: Lobsters
    url: https://lobste.rs/rss
    max_articles: 2
  - name: OpenAI Blog
    url: https://openai.com/blog/rss.xml
    max_articles: 2
  - name: Engadget
    url: https://www.engadget.com/rss.xml
    max_articles: 2
  - name: Wired
    url: https://www.wired.com/feed/rss
    max_articles: 2
  - name: The Verge
    url: https://www.theverge.com/rss/index.xml
    max_articles: 2
  - name: Ars Technica
    url: https://feeds.arstechnica.com/arstechnica/index
    max_articles: 2
  - name: TNW
    url: https://thenextweb.com/feed
    max_articles: 2
  - name: Electrek
    url: https://electrek.co/feed
    max_articles: 2
  - name: TechCrunch
    url: https://techcrunch.com/feed/
    max_articles: 2

# Schedule is configured externally (cron, Docker, GitHub Actions).
# Example: "0 8 * * *" for daily at 8 AM.

# Global keyword and age filters (optional)
# filter:
#   allowlist:                 # Only keep articles matching these terms
#     - Apple
#     - AI
#   blocklist:                 # Drop articles matching these terms
#     - sponsored
#     - press release
#   max_age_days: 3            # Skip articles older than this (0 = no limit)

# Notification channels (currently only email is supported)
notifications:
  - email

# SMTP settings for email delivery
email:
  smtp_host: smtp.gmail.com
  smtp_port: 587
  from: digest@example.com
  to:
    - you@example.com
    # - team@example.com      # Add more recipients as needed

# Path to the seen-article store (prevents duplicate articles across runs)
store:
  path: ./seen.json
